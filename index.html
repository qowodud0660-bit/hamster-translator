<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6937612426987841"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>햄스터 번역기 최종 v7</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #fff8f1;
      color: #3b2f2f;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 40px;
    }
    .sub {
      color: #7b6a6a;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .badges {
      margin-bottom: 18px;
    }
    .badge {
      display: inline-block;
      padding: 8px 12px;
      margin: 0 8px 8px 0;
      border-radius: 999px;
      background: #fff1d6;
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    button, select {
      border: 1px solid #e6d7cf;
      background: #fff;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    button.primary {
      background: #efb6c8;
      border-color: #efb6c8;
      font-weight: 700;
    }
    button.swap {
      background: #f6e7b8;
      border-color: #f6e7b8;
      font-weight: 700;
    }
    button.play {
      background: #bfe9ca;
      border-color: #bfe9ca;
      font-weight: 700;
    }
    button.mic {
      background: #cddcf7;
      border-color: #cddcf7;
      font-weight: 700;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      gap: 16px;
      align-items: stretch;
    }
    .panel {
      background: #fffaf8;
      border: 1px solid #ecdcd4;
      border-radius: 20px;
      padding: 18px;
      min-height: 340px;
      display: flex;
      flex-direction: column;
    }
    .panelTitle {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #6a5858;
    }
    textarea {
      width: 100%;
      min-height: 250px;
      resize: vertical;
      border: none;
      outline: none;
      background: transparent;
      font-size: 32px;
      line-height: 1.5;
      color: #2f2626;
      font-family: inherit;
    }
    .outputBox {
      flex: 1;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 32px;
      line-height: 1.5;
      color: #2f2626;
      padding-top: 6px;
    }
    .centerTools {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }
    .miniBtn {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      border: 1px solid #e6d7cf;
      background: #fff;
      font-size: 24px;
      cursor: pointer;
    }
    .meta {
      margin-top: 18px;
      background: #fdf3f7;
      border: 1px solid #f0dfe6;
      border-radius: 16px;
      padding: 14px;
      color: #786b6b;
      line-height: 1.7;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .panels {
        grid-template-columns: 1fr;
      }
      .centerTools {
        flex-direction: row;
      }
      .panel {
        min-height: 240px;
      }
      textarea, .outputBox {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐹 햄스터 번역기 최종 v7</h1>
    <div class="sub">
      방향 전환 시 입력/출력 박스의 언어 이름도 같이 바뀌는 버전이다.
    </div>

    <div class="badges">
      <span class="badge">정확 복호화</span>
      <span class="badge">2패널 UI</span>
      <span class="badge">양방향 번역</span>
      <span class="badge">1:1 자모 대응</span>
      <span class="badge">아기 햄스터 모드</span>
      <span class="badge">마이크 입력</span>
      <span class="badge">소리 재생</span>
    </div>

    <div class="toolbar">
      <select id="direction" onchange="handleDirectionChange()">
        <option value="ko2ham">한국어 → 햄스터어</option>
        <option value="ham2ko">햄스터어 → 한국어</option>
      </select>

      <button class="swap" onclick="swapDirection()">↔ 방향 바꾸기</button>

      <select id="mode">
        <option value="baby">아기 햄스터</option>
        <option value="normal">기본 햄스터</option>
      </select>

      <select id="emotion">
        <option value="normal">기본 감정</option>
        <option value="angry">화남</option>
        <option value="hungry">배고픔</option>
      </select>

      <button class="primary" onclick="translateText()">번역</button>
      <button class="play" onclick="playHamster()">🔊 소리 재생</button>
      <button id="micBtn" class="mic" onclick="toggleMic()">🎤 마이크 시작</button>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panelTitle" id="leftTitle">한국어</div>
        <textarea id="input" placeholder="여기에 입력"></textarea>
      </div>

      <div class="centerTools">
        <button class="miniBtn" onclick="swapTexts()" title="좌우 내용 바꾸기">⇄</button>
        <button class="miniBtn" onclick="copyOutput()" title="출력 복사">⧉</button>
      </div>

      <div class="panel">
        <div class="panelTitle" id="rightTitle">햄스터어</div>
        <div id="output" class="outputBox"></div>
      </div>
    </div>

    <div class="meta">
      <div id="meta">방향: 한국어 → 햄스터어 / 모드: 아기 햄스터 / 감정: 기본 / 처리 단위 수: 0</div>
      <div id="status">상태: 대기 중</div>
    </div>
  </div>

  <script>
    const CHO = [
      "ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ",
      "ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"
    ];

    const JUNG = [
      "ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ",
      "ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"
    ];

    const JONG = [
      "","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ",
      "ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ",
      "ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"
    ];

    const CHO_TOKENS = [
      "찍","찍찍","찍삑","찍뽁","찍뿍","찍쮹","찍츅","찍직","찍쮝",
      "삑","삑찍","삑삑","삑뽁","삑뿍","삑쮹","삑츅","삑직","삑쮝","뽁"
    ];

    const JUNG_TOKENS = [
      "쮹","쮹찍","쮹삑","쮹뽁","쮹뿍","쮹직","쮹쮝","쮹츅","츅","츅찍",
      "츅삑","츅뽁","츅뿍","츅직","츅쮝","츅쮹","직","직찍","직삑","직뽁","직뿍"
    ];

    const JONG_TOKENS = [
      "", "뿍","뿍찍","뿍삑","뿍뽁","뿍뿍","뿍직","뿍쮝","뿍쮹","뿍츅",
      "직쮹","직츅","직직","직쮝","쮝","쮝찍","쮝삑","쮝뽁","쮝뿍","쮝직",
      "쮝쮝","쮝쮹","쮝츅","쮝직찍","쮝직삑","쮝직뽁","쮝직뿍","쮝직쮝"
    ];

    const CHO_REVERSE = Object.fromEntries(CHO_TOKENS.map((v, i) => [v, CHO[i]]));
    const JUNG_REVERSE = Object.fromEntries(JUNG_TOKENS.map((v, i) => [v, JUNG[i]]));
    const JONG_REVERSE = Object.fromEntries(JONG_TOKENS.map((v, i) => [v, JONG[i]]));

    let recognition = null;
    let isListening = false;

    function applyEmotionDecor(syllableText) {
      const emotion = document.getElementById("emotion").value;
      const direction = document.getElementById("direction").value;
      if (direction !== "ko2ham") return syllableText;
      if (emotion === "angry") return syllableText + "!";
      if (emotion === "hungry") return "냠+" + syllableText;
      return syllableText;
    }

    function stripEmotionDecor(text) {
      return text.replace(/^냠\+/, "").replace(/!+$/g, "");
    }

    function composeHangul(choChar, jungChar, jongChar = "") {
      const choIndex = CHO.indexOf(choChar);
      const jungIndex = JUNG.indexOf(jungChar);
      const jongIndex = JONG.indexOf(jongChar);

      if (choIndex < 0 || jungIndex < 0 || jongIndex < 0) return "?";
      const code = 0xAC00 + choIndex * 588 + jungIndex * 28 + jongIndex;
      return String.fromCharCode(code);
    }

    function translateKoToHam(input) {
      const out = [];
      let count = 0;

      for (const ch of input) {
        if (ch === " ") {
          out.push("/");
          continue;
        }

        const code = ch.charCodeAt(0);

        if (code >= 44032 && code <= 55203) {
          const base = code - 44032;
          const cho = Math.floor(base / 588);
          const jung = Math.floor((base % 588) / 28);
          const jong = base % 28;

          const parts = [CHO_TOKENS[cho], JUNG_TOKENS[jung]];
          if (JONG_TOKENS[jong]) parts.push(JONG_TOKENS[jong]);

          out.push(applyEmotionDecor(parts.join("·")));
          count += 1;
        } else {
          out.push(ch);
        }
      }

      return { text: out.join(" "), count };
    }

    function translateHamToKo(input) {
      const chunks = input.trim().split(/\s+/).filter(Boolean);
      let result = "";
      let count = 0;

      for (const chunk of chunks) {
        if (chunk === "/") {
          result += " ";
          continue;
        }

        const clean = stripEmotionDecor(chunk);
        const parts = clean.split("·").filter(Boolean);

        if (parts.length < 2) {
          result += "?";
          continue;
        }

        const cho = CHO_REVERSE[parts[0]];
        const jung = JUNG_REVERSE[parts[1]];
        const jong = parts[2] ? (JONG_REVERSE[parts[2]] ?? "") : "";

        if (!cho || !jung) {
          result += "?";
          continue;
        }

        result += composeHangul(cho, jung, jong);
        count += 1;
      }

      return { text: result, count };
    }

    function updateTitles() {
      const direction = document.getElementById("direction").value;
      const leftTitle = document.getElementById("leftTitle");
      const rightTitle = document.getElementById("rightTitle");
      const input = document.getElementById("input");

      if (direction === "ko2ham") {
        leftTitle.innerText = "한국어";
        rightTitle.innerText = "햄스터어";
        input.placeholder = "여기에 한국어를 입력";
      } else {
        leftTitle.innerText = "햄스터어";
        rightTitle.innerText = "한국어";
        input.placeholder = "여기에 햄스터어를 입력";
      }
    }

    function handleDirectionChange() {
      updateTitles();
    }

    function translateText() {
      const input = document.getElementById("input").value.trim();
      const direction = document.getElementById("direction").value;

      const result = direction === "ko2ham"
        ? translateKoToHam(input)
        : translateHamToKo(input);

      document.getElementById("output").innerText = result.text;

      const directionLabel =
        direction === "ko2ham" ? "한국어 → 햄스터어" : "햄스터어 → 한국어";

      const modeText = document.getElementById("mode").value === "baby" ? "아기 햄스터" : "기본 햄스터";
      const emotionTextMap = { normal: "기본", angry: "화남", hungry: "배고픔" };
      const emotionText = emotionTextMap[document.getElementById("emotion").value];

      document.getElementById("meta").innerText =
        `방향: ${directionLabel} / 모드: ${modeText} / 감정: ${emotionText} / 처리 단위 수: ${result.count}`;
    }

    function swapDirection() {
      const select = document.getElementById("direction");
      select.value = select.value === "ko2ham" ? "ham2ko" : "ko2ham";
      updateTitles();
      translateText();
    }

    function swapTexts() {
      const input = document.getElementById("input");
      const output = document.getElementById("output");
      const temp = input.value;
      input.value = output.innerText;
      output.innerText = temp;
    }

    function copyOutput() {
      const text = document.getElementById("output").innerText;
      navigator.clipboard.writeText(text);
      setStatus("출력 복사 완료");
    }

    function setStatus(text) {
      document.getElementById("status").innerText = "상태: " + text;
    }

    function toggleMic() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("이 브라우저는 음성 인식을 지원하지 않는다. 크롬을 써라.");
        return;
      }

      const direction = document.getElementById("direction").value;
      if (direction !== "ko2ham") {
        alert("마이크는 한국어 → 햄스터어에서만 쓰는 게 맞다.");
        return;
      }

      if (!recognition) {
        recognition = new SpeechRecognition();
        recognition.lang = "ko-KR";
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onstart = () => {
          isListening = true;
          document.getElementById("micBtn").innerText = "🛑 마이크 중지";
          setStatus("마이크 듣는 중");
        };

        recognition.onend = () => {
          isListening = false;
          document.getElementById("micBtn").innerText = "🎤 마이크 시작";
          setStatus("대기 중");
        };

        recognition.onerror = (e) => setStatus("오류: " + e.error);

        recognition.onresult = (event) => {
          let finalText = "";
          let interim = "";

          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) finalText += transcript;
            else interim += transcript;
          }

          const textarea = document.getElementById("input");
          if (finalText.trim()) {
            textarea.value = (textarea.value + " " + finalText).trim();
            translateText();
          } else if (interim.trim()) {
            setStatus("듣는 중: " + interim);
          }
        };
      }

      if (isListening) recognition.stop();
      else recognition.start();
    }

    function playHamster() {
      const direction = document.getElementById("direction").value;
      const output = document.getElementById("output").innerText.trim();

      if (!output) {
        alert("먼저 번역을 해라.");
        return;
      }

      if (direction !== "ko2ham") {
        alert("소리 재생은 햄스터어 출력에서만 자연스럽다.");
        return;
      }

      const tokens = output.split(/\s+/).filter(Boolean).slice(0, 80);
      const emotion = document.getElementById("emotion").value;
      const mode = document.getElementById("mode").value;

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContextClass();
      let currentTime = ctx.currentTime;

      function createNoiseBuffer(duration = 0.05) {
        const sampleRate = ctx.sampleRate;
        const buffer = ctx.createBuffer(1, sampleRate * duration, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * 0.18;
        }
        return buffer;
      }

      function squeak(startTime, freq, duration, volume, oscType) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        osc.type = oscType;
        osc.frequency.setValueAtTime(freq, startTime);
        osc.frequency.linearRampToValueAtTime(freq + 70, startTime + duration * 0.4);
        osc.frequency.linearRampToValueAtTime(freq - 35, startTime + duration);

        filter.type = "bandpass";
        filter.frequency.value = Math.min(freq * 2.1, 4200);
        filter.Q.value = 3.5;

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        osc.start(startTime);
        osc.stop(startTime + duration);

        const noiseSource = ctx.createBufferSource();
        const noiseGain = ctx.createGain();
        noiseSource.buffer = createNoiseBuffer(duration);

        noiseGain.gain.setValueAtTime(0.0001, startTime);
        noiseGain.gain.exponentialRampToValueAtTime(volume * 0.22, startTime + 0.008);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        noiseSource.connect(noiseGain);
        noiseGain.connect(ctx.destination);
        noiseSource.start(startTime);
        noiseSource.stop(startTime + duration);
      }

      for (const token of tokens) {
        if (token === "/" || token.startsWith("냠+") || token.endsWith("!")) {
          currentTime += 0.08;
          continue;
        }

        let baseFreq = mode === "baby" ? 1320 : 980;
        baseFreq += (token.length % 5) * 65;

        let volume = mode === "baby" ? 0.08 : 0.11;
        let burstCount = mode === "baby" ? 3 : 2;
        let oscType = "triangle";

        if (emotion === "angry") {
          baseFreq -= 110;
          volume = 0.14;
          burstCount = 3;
          oscType = "sawtooth";
        }

        if (emotion === "hungry") {
          baseFreq += 40;
          volume = 0.095;
          burstCount = 2;
        }

        for (let j = 0; j < burstCount; j++) {
          const t = currentTime + j * 0.03;
          const freq = baseFreq + j * 45 + (Math.random() * 16 - 8);
          const dur = emotion === "angry" ? 0.045 : 0.055;
          squeak(t, freq, dur, volume, oscType);
        }

        currentTime += mode === "baby" ? 0.11 : 0.12;
      }
    }

    updateTitles();
  </script>
